id: no-nested-effect-service-yield
language: TypeScript
message: Bind Effect services before calling methods instead of nesting service yields.
severity: error
rule:
  any:
    - pattern: (yield* $SERVICE).$METHOD($$$ARGS)
    - pattern: (yield* $SERVICE).$PROPERTY.$METHOD($$$ARGS)
constraints:
  SERVICE:
    regex: \.Service$
