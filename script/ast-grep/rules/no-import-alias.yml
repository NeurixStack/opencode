id: no-import-alias
language: TypeScript
message: Do not alias value imports. For type name collisions, alias inside a dedicated `import type` statement.
severity: error
rule:
  all:
    - kind: import_specifier
    - has:
        field: alias
        kind: identifier
    - not:
        inside:
          pattern: import type { $$$SPECS } from "$MOD"
          stopBy: end
